# PostgreSQL Configuration (Environment Variables - NO fallback values for security)
# NOTE: Render provides PostgreSQL URL as postgresql://host:port/db
# Convert to JDBC format: jdbc:postgresql://host:port/db
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Mode - Use update for first deployment, then change to validate after tables are created
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL Naming Strategy (Required for compatibility)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway Migration Configuration - Enabled for production
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Settings
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=true

# JWT Configuration - JWT_SECRET must be at least 32 characters and securely generated
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# CORS Configuration - Environment-based for development and production
# Default allows localhost:3000 for development (Vite default)
# Production should set CORS_ALLOWED_ORIGINS to your Vercel domain (e.g., https://your-app.vercel.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Google Cloud Vision API
#google.cloud.vision.api-key=${GOOGLE_CLOUD_VISION_API_KEY}

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB
spring.servlet.multipart.enabled=true
